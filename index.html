<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generator stopka.html</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f3f4f6; margin: 0; padding: 24px; }
    .box { max-width: 720px; margin: 0 auto; background: #fff; border: 1px solid #d1d5db; border-radius: 10px; padding: 20px; }
    label { display: block; margin: 10px 0 6px; font-weight: 700; }
    input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
    .row { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    button { border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-weight: 700; }
    .primary { background: #2563eb; color: #fff; }
    .secondary { background: #e5e7eb; color: #111827; }
    pre { margin-top: 14px; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 8px; padding: 12px; max-height: 280px; overflow: auto; display: none; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Generator stopka.html</h2>

    <label for="name">Imię i nazwisko</label>
    <input id="name" required placeholder="np. Jan Kowalski" />

    <label for="role">Rola</label>
    <input id="role" required placeholder="np. Członek sekcji ds. Promocji" />

    <label for="phone">Numer telefonu</label>
    <input id="phone" required placeholder="np. +48 600 700 800" />

    <div class="row">
      <button class="primary" id="gen">Generuj i pobierz stopka.html</button>
      <button class="secondary" id="show">Pokaż podgląd</button>
    </div>

    <pre id="out"></pre>
  </div>

  <script>
    const out = document.getElementById('out');

    function esc(s) {
      return s
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function loadTemplate() {
      const res = await fetch('./stopka-template.html', { cache: 'no-store' });
      if (!res.ok) throw new Error('Nie udało się wczytać stopka-template.html');
      return await res.text();
    }

    function fillTemplate(template, name, role, phone) {
      return template
        .replaceAll('__NAME__', esc(name.trim()))
        .replaceAll('__ROLE__', esc(role.trim()))
        .replaceAll('__PHONE__', esc(phone.trim()));
    }

    function download(filename, content) {
      const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function generate(previewOnly = false) {
      const name = document.getElementById('name').value;
      const role = document.getElementById('role').value;
      const phone = document.getElementById('phone').value;

      const template = await loadTemplate();
      const result = fillTemplate(template, name, role, phone);

      if (previewOnly) {
        out.textContent = result;
        out.style.display = 'block';
      } else {
        download('stopka.html', result);
      }
    }

    document.getElementById('gen').addEventListener('click', async () => {
      try { await generate(false); }
      catch (e) { alert(e.message); }
    });

    document.getElementById('show').addEventListener('click', async () => {
      try { await generate(true); }
      catch (e) { alert(e.message); }
    });
  </script>
</body>
</html>

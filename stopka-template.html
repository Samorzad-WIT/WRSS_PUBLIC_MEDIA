<style> 
    * {margin: 0; padding: 0;}
    body { margin: 0; padding: 0; }
    
    table {
        border-spacing: 0;
        border-collapse: collapse;
    }
    .text {
        color: #616161;
        font-family: 'Trebuchet MS', Arial, sans-serif;
    }
    .name {
        font-size: 18px;
        font-weight: bold;
        color: #1b1c1e;
    }
    .role {

    }

    }
    .info-row {

        color: #616161;
        padding-bottom: 4px;
    }
    .icon {
        width: 12px;
        height: 12px;
        vertical-align: middle;
        margin-right: 5px;
    }
</style>
<body>
    <table cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td valign="middle" style="padding-right: 15px; width: 60px;">

            </td>

                <div class="text role">__ROLE__</div>
            </td>
        </tr>
        <tr>
            <td colspan="2" style="padding-top: 10px;">

                <div class="text info-row">
                    <img class="icon" src="https://samorzad-wit.github.io/WRSS_PUBLIC_MEDIA/w4/phone_footer_logo.png">
                    <span style="vertical-align: middle;">__PHONE__</span>
                </div>
                <div class="text info-row">
                    <img class="icon" src="https://samorzad-wit.github.io/WRSS_PUBLIC_MEDIA/w4/mail_footer_logo.png">
                    <span style="vertical-align: middle;">wit@samorzad.pwr.edu.pl</span>
                </div>
                <div class="text info-row"> 
                    <img class="icon" src="https://samorzad-wit.github.io/WRSS_PUBLIC_MEDIA/w4/facebook_footer_logo.png">
                    <span style="vertical-align: middle;">www.facebook.com/samorzad.wita</span>
                </div>
                <div class="text info-row">
                    <img class="icon" src="https://samorzad-wit.github.io/WRSS_PUBLIC_MEDIA/w4/instagram_footer_logo.png">
                    <span style="vertical-align: middle;">www.instagram.com/team_w4n/</span>
                </div>
            </td>
        </tr>
